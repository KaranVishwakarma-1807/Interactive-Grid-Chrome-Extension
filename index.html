<!DOCTYPE html>
<html>
<head>
  <title>New Tab</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/tab-icon" href="assets/favicon.png">
</head>
<body>

  <div id="clock"></div>

  <form id="searchForm">
    <input type="text" id="searchInput" placeholder="Search Google...">
  </form>

  <div id="settingsBtn">
    <img src="assets/gear_logo.svg" alt="Settings" width="24" height="24">
  </div>

  <div id="settingsPanel">
    <h3>Settings</h3>

    <label>Grid Spacing</label>
    <input type="range" id="spacing" min="10" max="50">

    <label>Speed</label>
    <input type="range" id="speed" min="0.05" max="0.3" step="0.01">

    <label>Theme</label>
    <!-- New Custom Dropdown -->
    <div class="custom-select-wrapper">
      <div class="custom-select" id="themeSelect">
        <span id="selectedThemeText">Ocean</span>
        <div class="arrow"></div>
      </div>
      <div class="custom-options" id="themeOptions">
        <div class="custom-option" data-value="ocean">Ocean</div>
        <div class="custom-option" data-value="neon">Neon</div>
        <div class="custom-option" data-value="sunset">Sunset</div>
      </div>
    </div>

    <button id="resetBtn">Reset</button>
    <h4>By Karan Vishwakarma</h4>
  </div>

  <script src="p5.min.js"></script>
  <script src="sketch.js"></script>
  <script src="ui.js"></script>
</body>
</html>
